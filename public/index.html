<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>HEX STRATEGY</title>
  <meta property="og:title"       content="HEX STRATEGY">
  <meta property="og:description" content="Edit, view, document and share hexo boards. Convert between notations and render boards as images.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://hexoboards.com/">
  <meta name="twitter:card"       content="summary">
  <link rel="canonical" href="https://hexoboards.com/">
  <link rel="stylesheet" href="/strategies/style.css">
</head>
<body>

<div id="view-editor">
  <div class="shared-header">
    <span class="title">HEX STRATEGY</span>
    <span class="sep">—</span>
    <span class="hdr-dim" data-tip="Board size (2–32)">s</span>
    <button class="btn size-btn" id="btn-size-dec">−</button>
    <input type="number" id="input-size" value="5" min="2" max="32">
    <button class="btn size-btn" id="btn-size-inc">+</button>
    <button class="btn" id="btn-apply-size">↵</button>
    <span class="sep" style="margin-left:4px">—</span>
    <button class="btn" id="btn-undo" data-tip="Undo (Ctrl+Z)">↩ undo</button>
    <button class="btn" id="btn-clear">✕ clear</button>
    <button class="btn save" id="btn-save" data-tip="Save (Ctrl+S)">★ save</button>
    <nav class="tab-strip">
      <button class="btn active" id="tab-editor">Editor</button>
      <button class="btn"        id="tab-browser">Browser</button>
      <button class="btn"        id="tab-data">Libraries</button>
      <button class="btn"        id="tab-convert">Convert</button>
      <button class="btn btn-theme" data-tip="Toggle theme (dark / light / system)">◑</button>
    </nav>
  </div>

  <div class="editor-toolbar">
    <span class="toolbar-label">place</span>
    <button class="btn"        id="btn-mode-x">X</button>
    <button class="btn"        id="btn-mode-o">O</button>
    <button class="btn active" id="btn-mode-auto" data-tip="Auto-alternates X/O">auto</button>
    <span class="sep" style="margin: 0 6px">—</span>
    <span class="toolbar-label">label</span>
    <button class="btn" id="btn-label-mode" data-tip="Toggle letter / number labels">a</button>
    <span class="toolbar-hint">left-drag stones · right-drag labels · ctrl clears</span>
    <span class="sep" style="margin:0 6px">—</span>
    <button class="btn" id="btn-rotate-ccw" data-tip="Rotate 60° counter-clockwise">↺</button>
    <button class="btn" id="btn-rotate-cw"  data-tip="Rotate 60° clockwise">↻</button>
    <button class="btn" id="btn-mirror"     data-tip="Mirror (vertical axis)">⇔</button>
  </div>

  <div id="board-area"><svg id="board-svg"></svg></div>

  <div id="note-panel">
    <div class="panel-resize" id="note-resize"></div>
    <div id="note-area">
      <div>
        <div class="note-field-label">Title</div>
        <input type="text" id="title-text" placeholder="position title…">
      </div>
      <div style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="note-field-label">Note</div>
        <textarea id="note-text" placeholder="notes for this position…"></textarea>
      </div>
    </div>
  </div>

  <div id="notation-panel">
    <div class="panel-resize" id="notation-resize"></div>
    <div class="notation-inner">
      <div class="nf-section">
        <div class="nf-hdr"><span class="nf-label">BKE</span><span class="tip" data-tip="Boat-Kaitlyn-Epic — ring/offset, rotation-independent">?</span><button class="btn nf-copy" id="nf-copy-bke">⎘</button></div>
        <textarea class="nf-out" id="nf-bke"></textarea>
        <button class="btn nf-load" id="nf-load-bke" data-tip="Load into editor">↑ load</button>
      </div>
      <div class="nf-section">
        <div class="nf-hdr"><span class="nf-label">HTN</span><span class="tip" data-tip="Hexagonal Tic Tac Toe Notation — synthesized from board state">?</span><button class="btn nf-copy" id="nf-copy-htn">⎘</button></div>
        <textarea class="nf-out" id="nf-htn"></textarea>
        <button class="btn nf-load" id="nf-load-htn" data-tip="Load into editor">↑ load</button>
      </div>
      <div class="nf-section">
        <div class="nf-hdr"><span class="nf-label">Axial</span><span class="tip" data-tip="Axial (q,r) coordinates — standard programming format">?</span><button class="btn nf-copy" id="nf-copy-axial">⎘</button></div>
        <textarea class="nf-out" id="nf-axial"></textarea>
        <button class="btn nf-load" id="nf-load-axial" data-tip="Load into editor">↑ load</button>
      </div>
      <div class="nf-footer">to import, use the Convert tab</div>
    </div>
  </div>

  <div id="panel-toggles">
    <button id="note-toggle-btn">note</button>
    <button id="notation-toggle-btn">notation</button>
  </div>

  <div class="editor-footer">
    <span id="footer-stones">X: 0  O: 0  total: 0</span>
    <span id="editor-mode" class="footer-mode">new</span>
    <span id="footer-hash"></span>
    <button class="btn" id="btn-copy-board" data-tip="Copy shareable link">⎘ share</button>
    <button class="btn" id="btn-copy-image" data-tip="Copy board as PNG image">⎘ image</button>
  </div>
</div>

<div id="view-browser" hidden>
  <div class="shared-header">
    <span class="title">HEX STRATEGY</span>
    <span class="sep">—</span>
    <span style="color:var(--muted);font-size:10px">browser</span>
    <nav class="tab-strip">
      <button class="btn"        id="tab-editor-b">Editor</button>
      <button class="btn active" id="tab-browser-b">Browser</button>
      <button class="btn"        id="tab-data-b">Libraries</button>
      <button class="btn"        id="tab-convert-b">Convert</button>
      <button class="btn btn-theme" data-tip="Toggle theme">◑</button>
    </nav>
  </div>

  <div class="browser-toolbar" id="browser-toolbar">
    <span class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="browser-search" placeholder="search…" data-tip="Search (Ctrl+F)">
      <button id="btn-search-clear" hidden>✕</button>
    </span>
    <div class="browser-toolbar-right">
      <button class="btn" id="btn-compact" data-tip="Toggle compact grid view">⊞</button>
      <button class="btn" id="btn-collapse-all" data-tip="Collapse all sections">▸▸</button>
      <button class="btn" id="btn-expand-all"   data-tip="Expand all sections">▾▾</button>
    </div>
  </div>

  <aside class="lib-sidebar" id="lib-sidebar">
    <div class="sidebar-head">Libraries</div>
    <div id="browser-crumb" class="browser-crumb" hidden></div>
    <div id="lib-nav"></div>
    <div class="sidebar-resize" id="sidebar-resize"></div>
  </aside>

  <div class="browser-main" id="browser-main">
    <div id="browser-doc"></div>
  </div>

  <button id="btn-back-to-top" hidden data-tip="Back to top">↑</button>
</div>

<div id="view-data" hidden>
  <div class="shared-header">
    <span class="title">HEX STRATEGY</span>
    <span class="sep">—</span>
    <span style="color:var(--muted);font-size:10px">libraries</span>
    <nav class="tab-strip">
      <button class="btn"        id="tab-editor-d">Editor</button>
      <button class="btn"        id="tab-browser-d">Browser</button>
      <button class="btn active" id="tab-data-d">Libraries</button>
      <button class="btn"        id="tab-convert-d">Convert</button>
      <button class="btn btn-theme" data-tip="Toggle theme">◑</button>
    </nav>
  </div>
  <div class="data-body">
    <div class="lib-panel">
      <div class="lib-panel-head">Saved libraries</div>
      <div id="lib-mgmt-list"></div>
      <div id="lib-mgmt-footer" class="lib-mgmt-footer"></div>
      <div class="lib-add-row">
        <input type="text" id="lib-add-name" placeholder="name">
        <input type="text" id="lib-add-url"  placeholder="pastebin raw · github raw · any JSON url">
        <button class="btn" id="btn-lib-add">+ add</button>
      </div>
    </div>
  </div>
</div>

<div id="view-convert" hidden>
  <div class="shared-header">
    <span class="title">HEX STRATEGY</span>
    <span class="sep">—</span>
    <span style="color:var(--muted);font-size:10px">convert</span>
    <nav class="tab-strip">
      <button class="btn"        id="tab-editor-c">Editor</button>
      <button class="btn"        id="tab-browser-c">Browser</button>
      <button class="btn"        id="tab-data-c">Libraries</button>
      <button class="btn active" id="tab-convert-c">Convert</button>
      <button class="btn btn-theme" data-tip="Toggle theme">◑</button>
    </nav>
  </div>
  <div class="cv-body">
    <div class="cv-side">
      <div class="cv-hdr">
        <label class="cv-lbl">from</label>
        <select id="conv-from" class="conv-select"><option value="htn">HTN</option><option value="bke">BKE</option><option value="axial">Axial</option></select>
        <button class="btn" id="btn-conv-from-editor" data-tip="Load current editor board as input">← editor</button>
        <label class="cv-batch"><input type="checkbox" id="conv-batch"> batch<span class="tip" data-tip="Input is a JSON array of strings">?</span></label>
      </div>
      <textarea id="conv-input" placeholder="paste notation here…"></textarea>
    </div>
    <div class="cv-mid"><button class="btn" id="btn-convert">→</button></div>
    <div class="cv-side">
      <div class="cv-hdr">
        <label class="cv-lbl">to</label>
        <select id="conv-to" class="conv-select"><option value="bke">BKE</option><option value="axial">Axial</option><option value="htn">HTN</option></select>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn" id="btn-conv-copy">⎘ copy</button>
          <button class="btn" id="btn-conv-load" data-tip="Load result into Editor">↑ editor</button>
        </div>
      </div>
      <textarea id="conv-output" readonly placeholder="result…"></textarea>
    </div>
  </div>
</div>

<div id="tooltip" hidden></div>
<div class="toast" id="toast"></div>

<script src="/strategies/js/index.js" type="module"></script>
</body>
</html>
